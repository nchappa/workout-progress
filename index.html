<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- ── PWA META ── -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ravi Lifts">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0a0f'/%3E%3Ctext x='90' y='118' text-anchor='middle' font-size='86' font-family='system-ui'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Ravi+Lifts%22%2C%22short_name%22%3A%22Ravi+Lifts%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22theme_color%22%3A%22%230a0a0f%22%7D">

<meta name="mobile-web-app-capable" content="yes">
<title>Ravi Lifts</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #13131a;
  --card2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --accent: #c8f53a;
  --accent-dim: rgba(200,245,58,0.12);
  --accent2: #ff6b35;
  --text: #f2f2f6;
  --muted: #66667a;
  --muted2: #3a3a50;
  --push: #ff6b35;
  --pull: #4da6ff;
  --legs: #4dff91;
  --upper: #e06bff;
  --lower: #6b8fff;
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── SCREENS ── */
.screen { display:none; flex-direction:column; height:100vh; overflow:hidden; position:absolute; inset:0; max-width:430px; margin:0 auto; }
.screen.active { display:flex; }

/* ── SAFE AREA ── */
.safe-top { height: env(safe-area-inset-top, 44px); background: var(--bg); flex-shrink:0; }
.safe-bottom { height: env(safe-area-inset-bottom, 20px); }

/* ── SCROLL ── */
.scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:90px; }
.scroll-area::-webkit-scrollbar { display:none; }

/* ── STATUS BAR AREA ── */
.status-row {
  display:flex; justify-content:space-between; align-items:center;
  padding: 8px 20px 0; flex-shrink:0;
}
.status-time { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
.status-icons { font-size:12px; color:var(--muted); display:flex; gap:5px; align-items:center; }

/* ── NAV BAR ── */
.nav-bar {
  position: fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px;
  background: rgba(10,10,15,0.95);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--border);
  display:flex; z-index:200;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding: 10px 0 12px; cursor:pointer; gap:3px;
  transition: opacity 0.15s;
}
.nav-item:active { opacity:0.6; }
.nav-icon { font-size:24px; line-height:1; }
.nav-label { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:0.3px; }
.nav-item.active .nav-label { color:var(--accent); }

/* ── HOME ── */
.home-header { padding:20px 20px 16px; }
.greeting { font-size:13px; color:var(--muted); margin-bottom:3px; font-weight:500; }
.home-title { font-size:30px; font-weight:800; letter-spacing:-0.8px; line-height:1.1; }
.home-title em { color:var(--accent); font-style:normal; }

.week-strip { display:flex; gap:8px; padding:0 20px 20px; overflow-x:auto; }
.week-strip::-webkit-scrollbar { display:none; }
.wd {
  flex-shrink:0; width:54px; padding:10px 6px 8px;
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; text-align:center; cursor:pointer;
  transition: border-color 0.2s, background 0.2s;
}
.wd.today { border-color:var(--accent); background:var(--accent-dim); }
.wd.logged { opacity:0.5; }
.wd-n { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
.wd-d { font-size:18px; font-weight:800; margin-bottom:4px; }
.wd-e { font-size:16px; }
.wd-t { font-size:8px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; margin-top:3px; }

.sec-title { padding:0 20px 10px; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }

.scard {
  margin:0 16px 10px; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; cursor:pointer; transition:transform 0.12s;
}
.scard:active { transform:scale(0.98); }
.scard-top { padding:16px 16px 12px; display:flex; align-items:center; gap:12px; }
.sbadge {
  width:44px; height:44px; border-radius:13px;
  display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;
}
.smeta { flex:1; min-width:0; }
.sday { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:2px; }
.sname { font-size:18px; font-weight:800; letter-spacing:-0.4px; }
.sarrow { color:var(--muted2); font-size:20px; font-weight:300; }
.stags { padding:0 16px 12px; display:flex; gap:6px; flex-wrap:wrap; }
.stag { font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; background:var(--card2); }
.sstats { padding:10px 16px; border-top:1px solid var(--border); display:flex; gap:20px; }
.ss { font-size:11px; color:var(--muted); }
.ss b { color:var(--text); font-weight:700; }

/* ── SESSION SCREEN ── */
.sess-header {
  padding:12px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.back-btn {
  width:36px; height:36px; border-radius:10px;
  background:var(--card2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer; flex-shrink:0; color:var(--text);
}
.back-btn:active { opacity:0.6; }
.sh-info { flex:1; min-width:0; }
.sh-day { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }
.sh-name { font-size:18px; font-weight:800; letter-spacing:-0.4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.timer-row {
  margin:12px 16px; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:12px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.timer-lbl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.timer-val { font-size:24px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; letter-spacing:-0.5px; }
.tbtn-wrap { margin-left:auto; display:flex; gap:6px; }
.tbtn {
  padding:8px 14px; border-radius:9px;
  border:1px solid var(--border); background:var(--card2);
  color:var(--text); font-size:13px; font-weight:700;
  cursor:pointer; font-family:var(--font);
}
.tbtn:active { opacity:0.7; }
.tbtn.pri { background:var(--accent); color:#000; border-color:var(--accent); }

.grp-hdr {
  padding:18px 20px 8px; font-size:10px; font-weight:700;
  color:var(--muted); text-transform:uppercase; letter-spacing:2px;
  display:flex; align-items:center; gap:8px;
}
.grp-line { flex:1; height:1px; background:var(--border); }

.excard {
  margin:0 16px 10px; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
}
.excard-hdr { padding:14px 14px 10px; display:flex; align-items:flex-start; gap:10px; }
.ex-nbadge {
  width:26px; height:26px; border-radius:7px; background:var(--card2);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; color:var(--muted); flex-shrink:0;
}
.ex-info { flex:1; min-width:0; }
.ex-nm { font-size:15px; font-weight:700; line-height:1.2; }
.ex-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.rpe-pill {
  padding:4px 9px; border-radius:7px; font-size:11px; font-weight:800;
  flex-shrink:0; letter-spacing:0.3px;
}
.rpe7 { background:rgba(77,255,145,0.15); color:#4dff91; }
.rpe8 { background:rgba(255,180,0,0.15); color:#ffb400; }
.rpe9 { background:rgba(255,107,53,0.15); color:#ff6b35; }

.sets-wrap { padding:0 14px 14px; }
.sets-hdr {
  display:grid; grid-template-columns:26px 1fr 1fr 1fr 38px;
  gap:5px; padding:0 0 5px;
  font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px;
}
.set-row {
  display:grid; grid-template-columns:26px 1fr 1fr 1fr 38px;
  gap:5px; align-items:center; margin-bottom:5px;
}
.set-n { font-size:12px; font-weight:700; color:var(--muted2); text-align:center; }
.sinput {
  background:var(--card2); border:1px solid var(--border);
  border-radius:8px; padding:9px 6px;
  color:var(--text); font-family:var(--font);
  font-size:14px; font-weight:700; text-align:center;
  width:100%; outline:none; -webkit-appearance:none;
  transition:border-color 0.15s;
}
.sinput:focus { border-color:var(--accent); }
.sinput::placeholder { color:var(--muted2); font-weight:400; font-size:12px; }
.done-btn {
  width:36px; height:36px; border-radius:9px;
  border:2px solid var(--border); background:transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:15px; transition:all 0.15s; flex-shrink:0;
}
.done-btn:active { transform:scale(0.9); }
.done-btn.done { background:var(--accent); border-color:var(--accent); }
.addset-btn {
  width:100%; padding:9px; background:transparent;
  border:1px dashed var(--muted2); border-radius:9px;
  color:var(--muted); font-family:var(--font); font-size:12px; font-weight:700;
  cursor:pointer; margin-top:4px;
}
.addset-btn:active { background:var(--card2); }

.ex-note {
  border-top:1px solid var(--border); padding:10px 14px 12px;
  font-size:11px; color:var(--muted); line-height:1.5; font-style:italic;
}

.cardio-note {
  margin:8px 16px 4px;
  padding:12px 14px; background:rgba(255,107,53,0.08);
  border:1px solid rgba(255,107,53,0.2); border-radius:var(--radius-sm);
  font-size:12px; color:var(--accent2);
}
.cardio-note b { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }

.sess-footer {
  flex-shrink: 0;
  background: rgba(10,10,15,0.97);
  border-top: 1px solid var(--border);
  padding: 10px 16px 0;
}
.finish-btn {
  width: 100%;
  padding:16px; background:var(--accent); color:#000;
  border:none; border-radius:var(--radius);
  font-family:var(--font); font-size:16px; font-weight:800;
  cursor:pointer; letter-spacing:-0.3px;
}
.finish-btn:active { opacity:0.85; }

/* ── LOG SCREEN ── */
.log-hdr { padding:20px 20px 16px; }
.log-title { font-size:28px; font-weight:800; letter-spacing:-0.8px; }
.log-sub { font-size:13px; color:var(--muted); margin-top:4px; }

.exp-btn {
  margin:0 16px; width:calc(100% - 32px); padding:15px;
  background:var(--card); border:1px solid var(--accent);
  border-radius:var(--radius); color:var(--accent);
  font-family:var(--font); font-size:14px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
}
.exp-btn:active { opacity:0.8; }

.exp-preview {
  margin:10px 16px 0; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:14px; font-family:monospace; font-size:10px; color:var(--muted);
  white-space:pre-wrap; line-height:1.8; max-height:160px; overflow-y:auto;
  display:none;
}
.exp-preview.show { display:block; }

.copy-btn {
  margin:8px 16px 0; width:calc(100% - 32px); padding:14px;
  background:var(--accent); border:none; border-radius:var(--radius-sm);
  color:#000; font-family:var(--font); font-size:14px; font-weight:800;
  cursor:pointer; display:none;
}
.copy-btn.show { display:block; }
.copy-btn:active { opacity:0.9; }

.lentry {
  margin:10px 16px 0; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
}
.lentry-hdr {
  padding:14px 14px; display:flex; align-items:center; gap:10px; cursor:pointer;
}
.lentry-hdr:active { background:var(--card2); }
.lentry-date { font-size:11px; font-weight:600; color:var(--muted); }
.lentry-name { font-size:15px; font-weight:700; }
.lentry-badge { padding:3px 9px; border-radius:7px; font-size:10px; font-weight:800; margin-left:auto; flex-shrink:0; background:var(--accent-dim); color:var(--accent); }
.lentry-body { padding:0 14px 12px; display:none; }
.lentry-body.open { display:block; }
.lex-row { padding:7px 0; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.lex-nm { font-size:12px; color:var(--muted); flex:1; }
.lex-data { font-size:12px; font-weight:700; color:var(--text); text-align:right; }

.empty { padding:60px 24px; text-align:center; }
.empty-ico { font-size:52px; margin-bottom:16px; }
.empty-t { font-size:18px; font-weight:700; margin-bottom:8px; }
.empty-s { font-size:13px; color:var(--muted); line-height:1.6; }

/* ── MODAL ── */
.modal-bg {
  position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px); display:none; align-items:flex-end;
}
.modal-bg.open { display:flex; }
.modal {
  width:100%; max-width:430px; margin:0 auto;
  background:#1c1c26; border-radius:26px 26px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
  border-top:1px solid var(--border);
}
.modal-pip { width:36px; height:4px; background:var(--muted2); border-radius:2px; margin:0 auto 20px; }
.modal-t { font-size:22px; font-weight:800; margin-bottom:6px; letter-spacing:-0.4px; }
.modal-s { font-size:13px; color:var(--muted); margin-bottom:22px; line-height:1.5; }
.mbtn {
  width:100%; padding:16px; border-radius:14px;
  font-family:var(--font); font-size:16px; font-weight:800;
  cursor:pointer; margin-bottom:10px; transition:opacity 0.15s;
}
.mbtn:active { opacity:0.8; }
.mbtn.pri { background:var(--accent); color:#000; border:none; }
.mbtn.sec { background:transparent; color:var(--muted); border:1px solid var(--border); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(85px + env(safe-area-inset-bottom, 0px)); left:50%; transform:translateX(-50%);
  background:var(--accent); color:#000;
  padding:11px 22px; border-radius:100px;
  font-size:13px; font-weight:700; z-index:400;
  opacity:0; transition:opacity 0.25s; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- ── HOME ── -->
<div class="screen active" id="screen-home">
  <div class="safe-top"></div>
  <div class="status-row">
    <span class="status-time" id="clk">9:41</span>
    <span class="status-icons">📶 🔋</span>
  </div>
  <div class="scroll-area">
    <div class="home-header">
      <div class="greeting" id="greeting">Good morning,</div>
      <div class="home-title">Let's lift, <em>Ravi.</em></div>
    </div>
    <div class="week-strip" id="wstrip"></div>
    <div class="sec-title">This Week's Programme</div>
    <div id="scards"></div>
    <div class="safe-bottom"></div>
  </div>
</div>

<!-- ── SESSION ── -->
<div class="screen" id="screen-session">
  <div class="safe-top"></div>
  <div class="sess-header">
    <div class="back-btn" onclick="goHome()">‹</div>
    <div class="sh-info">
      <div class="sh-day" id="sh-day">Monday</div>
      <div class="sh-name" id="sh-name">Push</div>
    </div>
  </div>
  <div class="timer-row">
    <div>
      <div class="timer-lbl">Session Timer</div>
      <div class="timer-val" id="tdisp">0:00</div>
    </div>
    <div class="tbtn-wrap">
      <button class="tbtn pri" id="tbtn" onclick="toggleTimer()">Start</button>
      <button class="tbtn" onclick="resetTimer()">Reset</button>
    </div>
  </div>
  <div class="scroll-area" id="sbody" style="padding-bottom:100px;"></div>
  <div class="sess-footer">
    <button class="finish-btn" onclick="finishSession()">Finish &amp; Save Session →</button>
    <div class="safe-bottom"></div>
  </div>
</div>

<!-- ── LOG ── -->
<div class="screen" id="screen-log">
  <div class="safe-top"></div>
  <div class="status-row">
    <span class="status-time" id="clk2">9:41</span>
    <span class="status-icons">📶 🔋</span>
  </div>
  <div class="scroll-area">
    <div class="log-hdr">
      <div class="log-title">Session Log</div>
      <div class="log-sub">Your training history — all stored on this device</div>
    </div>
    <button class="exp-btn" onclick="genExport()">📋 &nbsp;Generate Lift Log Export</button>
    <div class="exp-preview" id="eprev"></div>
    <button class="copy-btn" id="copybtn" onclick="copyLog()">Copy to Clipboard</button>
    <div style="height:10px"></div>
    <div id="lentries"></div>
    <div class="safe-bottom"></div>
  </div>
</div>

<!-- ── NAV ── -->
<div class="nav-bar">
  <div class="nav-item active" id="nav-home" onclick="switchNav('home')">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </div>
  <div class="nav-item" id="nav-log" onclick="switchNav('log')">
    <div class="nav-icon">📓</div>
    <div class="nav-label">Log</div>
  </div>
</div>

<!-- ── FINISH MODAL ── -->
<div class="modal-bg" id="fmodal">
  <div class="modal">
    <div class="modal-pip"></div>
    <div class="modal-t">Session Complete 💪</div>
    <div class="modal-s" id="fmodal-sub">Save this session to your log?</div>
    <button class="mbtn pri" onclick="saveSession()">Save to Log</button>
    <button class="mbtn sec" onclick="closeModal()">Discard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// PROGRAMME DATA
// ═══════════════════════════════════════════════════════
const P = [
  {
    id:'push', day:'Monday', name:'Push', emoji:'🔥',
    color:'var(--push)', bg:'rgba(255,107,53,0.13)',
    targets:['Chest','Shoulders','Triceps'],
    groups:[
      { label:'A · Chest', ex:[
        { id:'A1', name:'Smith Machine Bench Press', sets:4, reps:'6–8', weight:35, rpe:8, note:'Main compound. 2 sec lower. Control descent.' },
        { id:'A2', name:'Incline Dumbbell Press', sets:3, reps:'8–10', weight:30, rpe:7, note:'30–45° incline. Elbows ~75° flare.' },
        { id:'A3', name:'Cable Fly (low-to-high)', sets:3, reps:'12–15', weight:null, rpe:7, note:'⚠ Calibrate Week 1. Slow eccentric, full stretch at bottom.' },
      ]},
      { label:'B · Shoulders', ex:[
        { id:'B1', name:'Smith Machine OHP', sets:3, reps:'8–10', weight:30, rpe:8, note:'Seated. Control the lockout.' },
        { id:'B2', name:'Dumbbell Lateral Raise', sets:3, reps:'15–20', weight:15, rpe:7, note:'Add reps before adding weight. Slight forward lean.' },
        { id:'B3', name:'Cable Face Pull', sets:3, reps:'15–20', weight:null, rpe:7, note:'⚠ Calibrate Week 1. Rope attachment, high pulley.' },
      ]},
      { label:'C · Triceps', ex:[
        { id:'C1', name:'Cable Tricep Pushdown', sets:3, reps:'10–12', weight:50, rpe:7, note:'Full extension. Lock elbow at side.' },
        { id:'C2', name:'OH Tricep Extension (cable)', sets:3, reps:'12–15', weight:null, rpe:7, note:'⚠ Calibrate Week 1. Keep elbows tight.' },
      ]},
    ],
    cardio:'20 min Zone 2 after lifting — incline walk or bike.'
  },
  {

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let curSess = null;
let timerSec = 0, timerOn = false, timerIv = null;
let log = JSON.parse(localStorage.getItem('ravi_gymlog') || '[]');
let setCounters = {};

// ═══════════════════════════════════════════════════════
// CLOCK & GREETING
// ═══════════════════════════════════════════════════════
function tick() {
  const n = new Date();
  const t = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
  document.getElementById('clk').textContent = t;
  document.getElementById('clk2').textContent = t;
  const h = n.getHours();
  document.getElementById('greeting').textContent = h<12?'Good morning,':h<17?'Good afternoon,':'Good evening,';
}
tick(); setInterval(tick, 15000);

// ═══════════════════════════════════════════════════════
// WEEK STRIP
// ═══════════════════════════════════════════════════════
function buildWeek() {
  const DN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const DT = ['Push','Pull','Legs','Upper','Lower','Rest','Rest'];
  const DE = ['🔥','💪','🦵','⚡','🏋️','🚶','🌿'];
  const now = new Date();
  const dow = now.getDay();
  const mo = dow===0?-6:1-dow;
  let h='';
  for(let i=0;i<7;i++){
    const d=new Date(now); d.setDate(now.getDate()+mo+i);
    const isToday = d.toDateString()===now.toDateString();
    const ds = d.toLocaleDateString('en-GB');
    const isLogged = log.some(e=>e.date===ds);
    h+=`<div class="wd ${isToday?'today':''} ${isLogged?'logged':''}">
      <div class="wd-n">${DN[i]}</div>
      <div class="wd-d">${d.getDate()}</div>
      <div class="wd-e">${isLogged?'✅':DE[i]}</div>
      <div class="wd-t">${DT[i]}</div>
    </div>`;
  }
  document.getElementById('wstrip').innerHTML=h;
}

// ═══════════════════════════════════════════════════════
// SESSION CARDS
// ═══════════════════════════════════════════════════════
function buildCards() {
  let h='';
  P.forEach((s,i)=>{
    const totalEx=s.groups.reduce((a,g)=>a+g.ex.length,0);
    const totalSets=s.groups.reduce((a,g)=>a+g.ex.reduce((b,e)=>b+e.sets,0),0);
    h+=`<div class="scard" onclick="openSession(${i})">
      <div class="scard-top">
        <div class="sbadge" style="background:${s.bg}">${s.emoji}</div>
        <div class="smeta">
          <div class="sday">${s.day}</div>
          <div class="sname">${s.name}</div>
        </div>
        <div class="sarrow">›</div>
      </div>
      <div class="stags">${s.targets.map(t=>`<span class="stag" style="color:${s.color}">${t}</span>`).join('')}</div>
      <div class="sstats">
        <div class="ss"><b>${totalEx}</b> exercises</div>
        <div class="ss"><b>${totalSets}</b> sets</div>
        <div class="ss"><b>RPE 7–9</b></div>
      </div>
    </div>`;
  });
  document.getElementById('scards').innerHTML=h;
}

// ═══════════════════════════════════════════════════════
// OPEN SESSION
// ═══════════════════════════════════════════════════════
function openSession(idx) {
  setCounters = {};
  const s = P[idx];
  curSess = { idx, data:s };
  document.getElementById('sh-day').textContent = s.day;
  document.getElementById('sh-name').textContent = `${s.name} — ${s.targets.join(' · ')}`;

  let h='';
  s.groups.forEach(g=>{
    h+=`<div class="grp-hdr"><div class="grp-line"></div>${g.label}<div class="grp-line"></div></div>`;
    g.ex.forEach(ex=>{
      const rc = ex.rpe>=9?'rpe9':ex.rpe>=8?'rpe8':'rpe7';
      const dw = ex.weight!==null ? ex.weight : '';
      const pw = ex.weight!==null ? ex.weight : '';
      let rows='';
      for(let i=1;i<=ex.sets;i++){
        rows+=makeSetRow(ex.id,i,dw,pw,ex.reps,ex.rpe);
      }
      h+=`<div class="excard">
        <div class="excard-hdr">
          <div class="ex-nbadge">${ex.id}</div>
          <div class="ex-info">
            <div class="ex-nm">${ex.name}</div>
            <div class="ex-sub">${ex.sets} sets × ${ex.reps}</div>
          </div>
          <div class="rpe-pill ${rc}">RPE ${ex.rpe}</div>
        </div>
        <div class="sets-wrap" id="sw-${ex.id}">
          <div class="sets-hdr"><div>#</div><div>Weight</div><div>Reps</div><div>RPE</div><div>✓</div></div>
          ${rows}
          <button class="addset-btn" onclick="addSet('${ex.id}','${dw}','${ex.reps}',${ex.rpe})">+ Add Set</button>
        </div>
        ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
      </div>`;
      setCounters[ex.id] = ex.sets;
    });
  });
  h+=`<div class="cardio-note"><b>🏃 Cardio</b>${s.cardio}</div>`;
  h+=`<div style="height:24px"></div>`;

  document.getElementById('sbody').innerHTML=h;
  switchScreen('session');
  resetTimer();
}

function makeSetRow(id,i,dw,pw,reps,rpe){
  return `<div class="set-row" id="sr-${id}-${i}">
    <div class="set-n">${i}</div>
    <input class="sinput" id="w-${id}-${i}" type="number" inputmode="decimal" placeholder="${pw||'lbs'}" value="${dw}">
    <input class="sinput" id="r-${id}-${i}" type="number" inputmode="numeric" placeholder="${reps.split('–')[0]}">
    <input class="sinput" id="e-${id}-${i}" type="number" inputmode="numeric" placeholder="${rpe}" min="1" max="10">
    <button class="done-btn" id="db-${id}-${i}" onclick="toggleDone('${id}',${i})">○</button>
  </div>`;
}

function toggleDone(id,i){
  const b=document.getElementById(`db-${id}-${i}`);
  b.classList.toggle('done');
  b.textContent=b.classList.contains('done')?'✓':'○';
}

function addSet(id,dw,reps,rpe){
  setCounters[id]=(setCounters[id]||0)+1;
  const i=setCounters[id];
  const wrap=document.getElementById(`sw-${id}`);
  const addBtn=wrap.querySelector('.addset-btn');
  const div=document.createElement('div');
  div.innerHTML=makeSetRow(id,i,dw,dw,reps,rpe);
  wrap.insertBefore(div.firstChild,addBtn);
}

// ═══════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════
function toggleTimer(){
  if(timerOn){
    clearInterval(timerIv); timerOn=false;
    document.getElementById('tbtn').textContent='Resume';
  } else {
    timerIv=setInterval(()=>{
      timerSec++;
      const m=Math.floor(timerSec/60), s=(timerSec%60).toString().padStart(2,'0');
      document.getElementById('tdisp').textContent=`${m}:${s}`;
    },1000);
    timerOn=true;
    document.getElementById('tbtn').textContent='Pause';
  }
}
function resetTimer(){
  clearInterval(timerIv); timerOn=false; timerSec=0;
  document.getElementById('tdisp').textContent='0:00';
  document.getElementById('tbtn').textContent='Start';
}

// ═══════════════════════════════════════════════════════
// FINISH / SAVE
// ═══════════════════════════════════════════════════════
function finishSession(){
  const total=document.querySelectorAll('.done-btn').length;
  const done=document.querySelectorAll('.done-btn.done').length;
  document.getElementById('fmodal-sub').textContent=`${done} of ${total} sets completed. Save to your log?`;
  document.getElementById('fmodal').classList.add('open');
}
function closeModal(){ document.getElementById('fmodal').classList.remove('open'); }

function saveSession(){
  const s=curSess.data;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-GB');
  const exercises=[];

  s.groups.forEach(g=>{
    g.ex.forEach(ex=>{
      const sets=[];
      let i=1;
      while(document.getElementById(`w-${ex.id}-${i}`)){
        const wEl=document.getElementById(`w-${ex.id}-${i}`);
        const rEl=document.getElementById(`r-${ex.id}-${i}`);
        const eEl=document.getElementById(`e-${ex.id}-${i}`);
        const doneEl=document.getElementById(`db-${ex.id}-${i}`);
        const w = wEl.value.trim() || wEl.placeholder || '?';
        const r = rEl.value.trim() || rEl.placeholder || '?';
        const e = eEl.value.trim() || eEl.placeholder || ex.rpe;
        const done = doneEl ? doneEl.classList.contains('done') : false;
        sets.push({w, r, rpe:e, done});
        i++;
      }
      if(sets.length) exercises.push({name:ex.name, sets});
    });
  });

  const entry={
    date:dateStr,
    sessName:s.name,
    day:s.day,
    emoji:s.emoji,
    color:s.color,
    duration:Math.round(timerSec/60),
    exercises
  };

  log.unshift(entry);
  localStorage.setItem('ravi_gymlog', JSON.stringify(log));
  closeModal(); resetTimer();
  showToast('Session saved! 💪');
  buildWeek();
  goHome();
}

// ═══════════════════════════════════════════════════════
// LOG SCREEN
// ═══════════════════════════════════════════════════════
function buildLog(){
  const el=document.getElementById('lentries');
  if(!log.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📓</div><div class="empty-t">No sessions yet</div><div class="empty-s">Start a session from the home screen.<br>Every set you log appears here.</div></div>`;
    return;
  }
  el.innerHTML=log.map((e,i)=>{
    const rows=e.exercises.map(ex=>{
      const s=ex.sets.map(s=>`${s.w}×${s.r}`).join(', ');
      return `<div class="lex-row"><span class="lex-nm">${ex.name}</span><span class="lex-data">${s}</span></div>`;
    }).join('');
    return `<div class="lentry">
      <div class="lentry-hdr" onclick="toggleEntry(${i})">
        <div>
          <div class="lentry-date">${e.date}${e.duration?' · '+e.duration+' min':''}</div>
          <div class="lentry-name">${e.emoji} ${e.day} — ${e.sessName}</div>
        </div>
        <div class="lentry-badge">${e.exercises.length} ex</div>
      </div>
      <div class="lentry-body" id="lb-${i}">${rows}</div>
    </div>`;
  }).join('');
}
function toggleEntry(i){ document.getElementById(`lb-${i}`).classList.toggle('open'); }

// ═══════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════
function genExport(){
  if(!log.length){ showToast('No sessions to export yet'); return; }

  let txt = '=====================================\n';
  txt    += 'LIFT LOG\n';
  txt    += '=====================================\n\n';
  txt    += 'ATHLETE: Ravi\n\n';
  txt    += '-------------------------------------\n';
  txt    += 'SESSION LOG\n';
  txt    += '-------------------------------------\n\n';

  [...log].reverse().forEach(e=>{
    txt += `[${e.date}] — ${e.sessName}\n`;
    txt += `Week X | Block 1\n\n`;
    txt += `Exercise          | Sets x Reps | Weight (lbs) | RPE | Notes\n`;
    txt += `----------------------------------------------------------\n`;
    e.exercises.forEach(ex=>{
      const setsN  = ex.sets.length;
      const repsV  = ex.sets.map(s=>s.r).join('/');
      const weightV= ex.sets.map(s=>s.w+'lbs').join('/');
      const rpeV   = ex.sets.map(s=>s.rpe).join('/');
      const nm     = ex.name.substring(0,18).padEnd(18);
      txt += `${nm}| ${(setsN+'x'+repsV).padEnd(12)}| ${weightV.padEnd(14)}| ${rpeV}\n`;
    });
    txt += `\nSession notes: ${e.duration||'?'} min · ${e.day} ${e.sessName}\n\n`;
    txt += `----------------------------------------------------------\n\n`;
  });

  txt += '=====================================\n';
  txt += 'END OF LOG\n';
  txt += '=====================================\n';

  const prev=document.getElementById('eprev');
  prev.textContent=txt; prev.classList.add('show');
  document.getElementById('copybtn').classList.add('show');
}

function copyLog(){
  const txt=document.getElementById('eprev').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>showToast('Copied! Paste into your Lift Log 📋'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied! Paste into your Lift Log 📋');
  }
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function switchNav(tab){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`nav-${tab}`).classList.add('active');
  if(tab==='home'){ switchScreen('home'); }
  if(tab==='log'){ buildLog(); switchScreen('log'); }
}
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}
function goHome(){
  switchScreen('home');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════════
// SERVICE WORKER — inline, caches the page for offline use
// ═══════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  const sw = `
const CACHE = 'ravi-lifts-v1';
self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(hit => {
        const fresh = fetch(e.request).then(r => { if(r.ok) cache.put(e.request, r.clone()); return r; }).catch(()=>hit);
        return hit || fresh;
      })
    )
  );
});`;
  try {
    const blob = new Blob([sw], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildWeek();
buildCards();
